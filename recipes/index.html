<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>RecipeBook | Apple Crisp</title>
  <meta
    name="description"
    content="Find simple and delicious recipes, including this easy homemade apple crisp."
  >

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="RecipeBook | Apple Crisp">
  <meta
    property="og:description"
    content="Find simple and delicious recipes, including this easy homemade apple crisp."
  >
  <meta
    property="og:url"
    content="https://stockton5.github.io/wdd131/recipes/"
  >
  <meta
    property="og:image"
    content="https://stockton5.github.io/wdd131/recipes/images/apple-crisp.jpg"
  >

  <!-- X / Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RecipeBook | Apple Crisp">
  <meta
    name="twitter:description"
    content="Find simple and delicious recipes, including this easy homemade apple crisp."
  >
  <meta
    name="twitter:image"
    content="https://stockton5.github.io/wdd131/recipes/images/apple-crisp.jpg"
  >

  <link rel="icon" href="images/recipe-book.png">
  <link rel="apple-touch-icon" href="images/recipe-book.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>

<body>
  <header>
    <div class="logo">
      <img
        src="images/recipe-book.png"
        alt="Recipe book logo"
      >
      <h1>RecipeBook</h1>
    </div>
  </header>

  <main>
    <form class="search-form">
      <label class="sr-only" for="recipe-search">
        Find a recipe
      </label>

      <input
        type="search"
        id="recipe-search"
        name="recipe-search"
        placeholder="Find a recipe"
      >

      <button type="submit" aria-label="Search recipes">
        <img src="images/search.svg" alt="">
      </button>
    </form>

    <section class="recipe-card">
      <img
        class="recipe-image"
        src="images/apple-crisp.jpg"
        alt="A bowl of warm apple crisp served with vanilla ice cream"
      >

      <div class="recipe-content">
        <span class="tag">dessert</span>

        <h2>Apple Crisp</h2>

        <span
          class="rating"
          role="img"
          aria-label="Rating: 4 out of 5 stars"
        >
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star-empty">☆</span>
        </span>

        <p class="description">
          This apple crisp recipe is a simple yet delicious fall dessert
          that is great served warm with vanilla ice cream.
        </p>
      </div>
    </section>
  </main>

  <footer>
    <a
      class="attribution"
      href="https://www.flaticon.com/free-icons/recipe"
      title="recipe icons"
    >
      Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
      <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->

      <a href="#" aria-label="Instagram">
        <img
          src="images/instagram_icon.svg"
          alt="Instagram icon"
        >
      </a>

      <a href="#" aria-label="YouTube">
        <img
          src="images/youtube_icon.svg"
          alt="YouTube icon"
        >
      </a>

      <a href="#" aria-label="Pinterest">
        <img
          src="images/pinterest_icon.svg"
          alt="Pinterest icon"
        >
      </a>
    </div>
  </footer>
</body>
</html>
